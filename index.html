  <meta charset="UTF-8"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen"/>
  <meta name="apple-mobile-web-app-title" content="Dino Fun"/>
  <title>Dino Fun 🦕</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    html,body { width:100%; height:100%; overflow:hidden; touch-action:none; }
    body { transition: background 0.5s ease; display:flex; align-items:center; justify-content:center; }

    .leaf { position:fixed; pointer-events:none; font-size:12vw; opacity:0.13; animation:sway ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }

    .bubble { position:fixed; border-radius:50%; pointer-events:none; opacity:0.18; animation:floatUp linear infinite; }
    @keyframes floatUp { 0%{transform:translateY(110vh);opacity:0.18} 100%{transform:translateY(-20vh);opacity:0} }

    #stage { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }

    #dino-wrap {
      width:72vw; height:72vw; max-width:340px; max-height:340px;
      display:flex; align-items:center; justify-content:center;
      filter:drop-shadow(0 10px 30px rgba(0,0,0,0.3));
      animation:dinoIdle 2.8s ease-in-out infinite;
    }
    @keyframes dinoIdle {
      0%,100%{transform:translateY(0) rotate(-1deg)}
      40%{transform:translateY(-4vw) rotate(2deg)}
      70%{transform:translateY(-2vw) rotate(-2deg)}
    }
    #dino-wrap.bounce { animation:bigBounce 0.55s cubic-bezier(.34,1.56,.64,1) !important; }
    @keyframes bigBounce {
      0%{transform:scale(1) rotate(-1deg)}
      30%{transform:scale(1.28) rotate(10deg)}
      60%{transform:scale(0.9) rotate(-6deg)}
      100%{transform:scale(1) rotate(-1deg)}
    }
    #dino-svg { width:100%; height:100%; }

    #dino-name { font-size:9vw; font-weight:900; color:white; text-shadow:0 3px 0 rgba(0,0,0,0.25),0 6px 18px rgba(0,0,0,0.2); letter-spacing:0.04em; margin-top:3vw; text-align:center; padding:0 4vw; line-height:1.2; }
    .name-in { animation:nameIn 0.45s cubic-bezier(.34,1.56,.64,1); }
    @keyframes nameIn { 0%{transform:scale(0.4) translateY(15px);opacity:0} 100%{transform:scale(1) translateY(0);opacity:1} }

    #dino-fact { font-size:4.2vw; color:rgba(255,255,255,0.85); margin-top:2vw; text-align:center; padding:0 6vw; font-weight:700; line-height:1.4; }
    .fact-in { animation:factIn 0.5s ease-out 0.15s both; }
    @keyframes factIn { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }

    #hint { position:fixed; bottom:9vw; width:100%; text-align:center; font-size:5.5vw; color:rgba(255,255,255,0.8); font-weight:800; letter-spacing:0.05em; animation:pulse 1.8s ease-in-out infinite; transition:opacity 0.5s; }
    @keyframes pulse { 0%,100%{opacity:0.8;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }

    .burst { position:fixed; pointer-events:none; font-size:7vw; animation:burstOut 0.75s ease-out forwards; z-index:99; }
    @keyframes burstOut {
      0%{transform:translate(-50%,-50%) scale(0.2);opacity:1}
      100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.5);opacity:0}
    }

    #flash { position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity 0.08s; z-index:50; }
    #flash.on { opacity:0.28; transition:opacity 0s; }

    #roar { position:fixed; top:8vw; left:50%; transform:translateX(-50%); font-size:12vw; font-weight:900; color:white; text-shadow:0 4px 20px rgba(0,0,0,0.4); pointer-events:none; opacity:0; z-index:60; white-space:nowrap; }
    .roar-in { animation:roarPop 0.9s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes roarPop {
      0%{opacity:0;transform:translateX(-50%) scale(0.3)}
      30%{opacity:1;transform:translateX(-50%) scale(1.2)}
      70%{opacity:1;transform:translateX(-50%) scale(0.95)}
      100%{opacity:0;transform:translateX(-50%) scale(1.05)}
    }

    #counter { position:fixed; top:5vw; right:5vw; background:rgba(255,255,255,0.25); border-radius:50px; padding:2vw 4vw; font-size:4vw; font-weight:900; color:white; backdrop-filter:blur(6px); }
  </style>
</head>

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playSound(freq){
  try{
    const ctx=getAudio();
    [0,0.15,0.3].forEach((t,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(freq*(1-i*0.1),ctx.currentTime+t);
      osc.frequency.exponentialRampToValueAtTime(freq*0.5,ctx.currentTime+t+0.25);
      gain.gain.setValueAtTime(0.25,ctx.currentTime+t);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.28);
      osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

function makeBubbles(){
  const colors=["#6BCB77","#FFD93D","#FF6B35","#48CAE4","#C77DFF","#74C69D","#ADE8F4"];
  for(let i=0;i<10;i++){
    const b=document.createElement('div');b.className='bubble';
    const s=5+Math.random()*14;
    b.style.cssText=`width:${s}vw;height:${s}vw;left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s;`;
    document.body.appendChild(b);
  }
}

function spawnBurst(x,y){
  for(let i=0;i<8;i++){
    const el=document.createElement('div');el.className='burst';
    el.textContent=BURST_EMOJIS[Math.floor(Math.random()*BURST_EMOJIS.length)];
    const angle=(Math.PI*2/8)*i,dist=15+Math.random()*20;
    el.style.cssText=`left:${x}px;top:${y}px;--dx:${Math.cos(angle)*dist}vw;--dy:${Math.sin(angle)*dist}vw;animation-delay:${Math.random()*0.08}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),850);
  }
}

function showDino(idx){
  const d=DINOS[idx];
  document.getElementById('dino-svg').innerHTML=d.svg;
  document.body.style.background=`linear-gradient(135deg,${d.bg[0]},${d.bg[1]})`;
  const nameEl=document.getElementById('dino-name'),factEl=document.getElementById('dino-fact'),roarEl=document.getElementById('roar');
  nameEl.textContent=d.name;factEl.textContent=d.fact;
  nameEl.className='';nameEl.offsetHeight;nameEl.className='name-in';
  factEl.className='';factEl.offsetHeight;factEl.className='fact-in';
  roarEl.textContent=d.roar;roarEl.className='';roarEl.offsetHeight;roarEl.className='roar-in';
  const wrap=document.getElementById('dino-wrap');
  wrap.classList.remove('bounce');wrap.offsetHeight;wrap.classList.add('bounce');
  setTimeout(()=>wrap.classList.remove('bounce'),700);
  document.getElementById('counter').textContent=`${idx+1} / ${DINOS.length}`;
  playSound(d.sound);
}

function flash(color){
  const f=document.getElementById('flash');f.style.background=color;
  f.classList.add('on');setTimeout(()=>f.classList.remove('on'),90);
}

function onTap(e){
  e.preventDefault();
  const now=Date.now();if(now-lastTap<300)return;lastTap=now;
  const touch=e.touches?e.touches[0]:e;
  const x=touch?touch.clientX:window.innerWidth/2,y=touch?touch.clientY:window.innerHeight/2;
  currentIdx=(currentIdx+1)%DINOS.length;
  showDino(currentIdx);spawnBurst(x,y);flash(DINOS[currentIdx].bg[1]);
  document.getElementById('hint').style.opacity='0';
}

document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('selectstart',e=>e.preventDefault());
document.addEventListener('touchstart',onTap,{passive:false});
document.addEventListener('mousedown',onTap);
makeBubbles();showDino(0);
</script>
</body>
</html>
